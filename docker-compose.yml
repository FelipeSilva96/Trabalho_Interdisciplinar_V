services:
  postgres:
    image: postgres:16-alpine
    container_name: noisewatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: noisewatch
      POSTGRES_PASSWORD: noisewatch
      POSTGRES_DB: noisewatch_db
    ports:
      - "5435:5432"
    volumes:
      - noisewatch_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noisewatch -d noisewatch_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  noisewatch_postgres_data:
